<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Generator</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="mb-4 text-center">Text Generator</h3>

    <div class="row g-3">
      <div class="col-md-6">
        <input type="text" id="keyword" class="form-control" placeholder="Enter your topic (e.g. Garlic Chicken Recipe)">
      </div>

      <div class="col-md-6">
        <button onclick="generate()" class="btn btn-primary w-100">Generate Prompt</button>
      </div>
    </div>

    <hr>

    <h5>Result:</h5>
    <textarea id="result" class="form-control" rows="12" readonly></textarea>

  </div>
</div>

<script>
function generate() {
  const keyword = document.getElementById("keyword").value;

  if (!keyword) {
    alert("Please enter a topic");
    return;
  }

  const prompt = `Act as an experienced SEO copywriter tasked with creating a comprehensive and engaging outline for an article about "${keyword}".

The outline should structure the article in a way that is both reader-friendly and optimized for search engines.

- Begin with an eye-catching H1 headline that includes the primary keyword "${keyword}".
- Write an emotionally resonant introduction that connects with the reader.

Structure the article as follows:

H1: Title including "${keyword}"

H2: Introduction
- Emotional hook
- Why "${keyword}" matters

H2: Main Sections about "${keyword}"
- Use H3 and H4 subheadings
- Cover all aspects in logical flow

Include:
- Bullet points and numbered lists
- Data or references where needed

H2: Ingredients / Data Table (if applicable)
- Use tables especially for recipes

H2: Tips & Best Practices

H2: FAQ Section
- Include "${keyword}" in questions

H2: Conclusion
- Strong closing

Make sure to:
- Use H1, H2, H3, H4
- Optimize for SEO
- Keep it engaging and easy to read`;

  document.getElementById("result").value = prompt;
}
</script>

</body>
</html>
